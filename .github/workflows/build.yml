name: Build Windows Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish single-file exe
        run: >
          dotnet publish ScreenSeal/ScreenSeal.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          -o publish

      - name: Upload ScreenSeal.exe
        uses: actions/upload-artifact@v4
        with:
          name: ScreenSeal-win-x64
          path: publish/ScreenSeal.exe
          retention-days: 30
          if-no-files-found: error
